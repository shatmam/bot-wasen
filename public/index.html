<!DOCTYPE html>
<html>
<head>
<title>Panel</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; }
table { width:100%; }
td,th { padding:10px; text-align:center; }
button { background:green; color:white; border:none; padding:5px; }
</style>
</head>
<body>

<h1>Panel</h1>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Teléfono</th>
<th>Servicio</th>
<th>Días</th>
<th>Acción</th>
</tr>
</thead>

<tbody id="tabla"></tbody>
</table>

<script>
async function cargar(){
  const res = await fetch("/clientes");
  const data = await res.json();

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  data.forEach(c=>{
    tabla.innerHTML += `
    <tr>
      <td>${c.nombre}</td>
      <td>${c.telefono}</td>
      <td>${c.servicio}</td>
      <td>${c.dias}</td>
      <td>
        <button onclick="renovar(${c.row})">Renovar</button>
      </td>
    </tr>
    `;
  });
}

async function renovar(row){
  let dias = prompt("Días a agregar:");

  await fetch("/renovar",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ row, dias })
  });

  alert("Renovado");
  cargar();
}

cargar();
</script>

</body>
</html>
